<div class="otp-container">
  <div class="otp-card">
    <h2>Verify Your Email</h2>
    <p>We've sent a 6-digit OTP to <strong>{{ email() }}</strong></p>

    <form [formGroup]="otpForm" (ngSubmit)="onVerify()" class="otp-form">
      <div class="form-group">
        <label for="otp">Enter OTP</label>
        <input
          type="text"
          id="otp"
          formControlName="otp"
          placeholder="000000"
          maxlength="6"
          class="otp-input"
          [class.error]="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched"
        />
        <div class="error-message" *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched">
          Please enter a valid 6-digit OTP
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button type="submit" class="verify-btn" [disabled]="isLoading() || otpForm.invalid">
        <span *ngIf="isLoading()">Verifying...</span>
        <span *ngIf="!isLoading()">Verify OTP</span>
      </button>
    </form>

    <div class="resend-section">
      <p>Didn't receive the OTP?</p>
      <button type="button" class="resend-btn" (click)="onResendOtp()" [disabled]="isLoading()">
        Resend OTP
      </button>
    </div>
  </div>
</div>
